services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq-pji510
    hostname: rabbitmq-pji510
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?Defina RABBITMQ_PASS no .env}
      RABBITMQ_DEFAULT_VHOST: /pji510
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:8093:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./config/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running", "-q"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.50"
        reservations:
          memory: 256M

  api_bridge:
    build:
      context: ./api_bridge
      dockerfile: Dockerfile
    container_name: rabbitmq-pji510-api
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_VHOST: /pji510
      RABBITMQ_USER: ${SENSOR_PRODUCER_USER:-sensor_producer}
      RABBITMQ_PASS: ${SENSOR_PRODUCER_PASS:?Defina SENSOR_PRODUCER_PASS no .env}
      EXCHANGE_NAME: sensores.exchange
    ports:
      - "127.0.0.1:8094:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

volumes:
  rabbitmq_data:
