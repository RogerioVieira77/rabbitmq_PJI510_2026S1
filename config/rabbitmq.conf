## Configuração principal do RabbitMQ
## Ref: https://www.rabbitmq.com/docs/configure#config-file

# Carregar definitions no boot (exchanges, queues, bindings, users)
management.load_definitions = /etc/rabbitmq/definitions.json

# Limites de memória e disco para servidor compartilhado
vm_memory_high_watermark.relative = 0.4
disk_free_limit.relative = 1.5

# Logging
log.console = true
log.console.level = info

# Heartbeat para detectar conexões mortas
heartbeat = 60

# Prefetch padrão para consumers
consumer_timeout = 1800000
