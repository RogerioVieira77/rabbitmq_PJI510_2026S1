server {
    listen 80;
    server_name sensorespji510.unicomunitaria.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sensorespji510.unicomunitaria.com.br;

    ssl_certificate     /etc/letsencrypt/live/unicomunitaria.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unicomunitaria.com.br/privkey.pem;

    auth_basic "Simulador PJI510";
    auth_basic_user_file /etc/nginx/.htpasswd-simulador-pji510;

    location / {
        proxy_pass http://127.0.0.1:8084;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
