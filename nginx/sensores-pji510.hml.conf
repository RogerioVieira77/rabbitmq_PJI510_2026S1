server {
    listen 80;
    server_name sensores-pji510.unicomunitaria.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sensores-pji510.unicomunitaria.com.br;

    ssl_certificate     /etc/letsencrypt/live/unicomunitaria.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/unicomunitaria.com.br/privkey.pem;

    # Limite de tamanho do body (100 leituras * ~500 bytes ~= 50KB, margem para 1MB)
    client_max_body_size 1m;

    # Rate limiting: 10 requests/segundo por IP (burst 20)
    limit_req zone=sensores_limit burst=20 nodelay;

    location / {
        proxy_pass http://127.0.0.1:8094;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
